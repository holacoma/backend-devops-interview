services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: backend_devops_interview
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "6000:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: bash /app/entrypoint.sh
    stdin_open: true
    tty: true
    environment:
      DB_HOST: db
      DB_NAME: backend_devops_interview
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: 5432
      SEED_SCALE: 0.1
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
